services:
  api:
    image: ${API_IMAGE:-ghcr.io/example/tgo-network-api:latest}
    container_name: tgo-api
    restart: unless-stopped
    env_file:
      - ${API_ENV_FILE:-./api.env}
    ports:
      - "${API_PORT:-8787}:8787"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/ready').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
